<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>示例可视化报告</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e4e4e7;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(90deg, #00e5ff, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: #a1a1aa;
      margin-bottom: 2rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .card {
      background: rgba(30, 30, 46, 0.8);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 12px;
      padding: 1.5rem;
    }
    .card h3 {
      font-size: 0.875rem;
      color: #a1a1aa;
      margin-bottom: 0.5rem;
    }
    .card .value {
      font-size: 2rem;
      font-weight: 700;
      color: #00e5ff;
    }
    .card .change {
      font-size: 0.875rem;
      color: #10b981;
    }
    .chart-container {
      background: rgba(30, 30, 46, 0.8);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .chart-container h3 {
      font-size: 1rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI 编程工具市场分析</h1>
    <p class="subtitle">数据更新时间：2026年5月21日</p>

    <div class="grid">
      <div class="card">
        <h3>全球用户规模</h3>
        <div class="value">2.8 亿</div>
        <div class="change">↑ 156% YoY</div>
      </div>
      <div class="card">
        <h3>市场规模</h3>
        <div class="value">$48.2B</div>
        <div class="change">↑ 203% YoY</div>
      </div>
      <div class="card">
        <h3>企业渗透率</h3>
        <div class="value">67%</div>
        <div class="change">↑ 23pp YoY</div>
      </div>
      <div class="card">
        <h3>日均代码生成量</h3>
        <div class="value">12.6 亿行</div>
        <div class="change">↑ 312% YoY</div>
      </div>
    </div>

    <div class="chart-container">
      <h3>市场份额分布（2026 Q1）</h3>
      <canvas id="marketChart"></canvas>
    </div>

    <div class="chart-container">
      <h3>月度增长趋势</h3>
      <canvas id="growthChart"></canvas>
    </div>
  </div>

  <script>
    // Market Share Chart
    new Chart(document.getElementById('marketChart'), {
      type: 'doughnut',
      data: {
        labels: ['GitHub Copilot', 'Claude Code', 'Cursor', 'Windsurf', '其他'],
        datasets: [{
          data: [38, 28, 18, 9, 7],
          backgroundColor: [
            '#6366f1',
            '#00e5ff',
            '#10b981',
            '#f59e0b',
            '#6b7280'
          ],
          borderWidth: 0
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: {
            position: 'right',
            labels: { color: '#e4e4e7' }
          }
        }
      }
    });

    // Growth Trend Chart
    new Chart(document.getElementById('growthChart'), {
      type: 'line',
      data: {
        labels: ['1月', '2月', '3月', '4月', '5月'],
        datasets: [{
          label: '活跃用户（百万）',
          data: [180, 210, 245, 268, 280],
          borderColor: '#00e5ff',
          backgroundColor: 'rgba(0, 229, 255, 0.1)',
          fill: true,
          tension: 0.4
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: {
            labels: { color: '#e4e4e7' }
          }
        },
        scales: {
          x: {
            ticks: { color: '#a1a1aa' },
            grid: { color: 'rgba(99, 102, 241, 0.1)' }
          },
          y: {
            ticks: { color: '#a1a1aa' },
            grid: { color: 'rgba(99, 102, 241, 0.1)' }
          }
        }
      }
    });
  </script>
</body>
</html>
